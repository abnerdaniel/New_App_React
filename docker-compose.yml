services:
  # Backend .NET API
  backend-api:
    image: ghcr.io/abnerdaniel/controle-backend:latest
    build:
      context: ./controle-backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=62.84.187.140;Port=5432;Database=controle;Username=postgres;Password=Kjkszpj651
      - Jwt__Key=asd123asd123asd123256asd123ads123asd12325
      - Google__ClientId=677439314475-6in2n51squl2b15kggsp7c654q2ge06j.apps.googleusercontent.com
      - Google__ClientSecret=
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.controle-api.rule=Host(`api.food.meajudaaqui.com.br`)"
        - "traefik.http.routers.controle-api.entrypoints=websecure"
        - "traefik.http.routers.controle-api.tls.certresolver=le"
        - "traefik.http.services.controle-api.loadbalancer.server.port=8080"
      restart_policy:
        condition: on-failure
    networks:
      - traefik_public
      - backend-network

  # Frontend Admin (React)
  frontend-admin:
    image: ghcr.io/abnerdaniel/controle-frontend:latest
    build:
      context: ./controle-frontend
      dockerfile: Dockerfile
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.controle-admin.rule=Host(`admin.food.meajudaaqui.com.br`)"
        - "traefik.http.routers.controle-admin.entrypoints=websecure"
        - "traefik.http.routers.controle-admin.tls.certresolver=le"
        - "traefik.http.services.controle-admin.loadbalancer.server.port=80"
      restart_policy:
        condition: on-failure
    networks:
      - traefik_public

  # Frontend Cliente (React)
  frontend-cliente:
    image: ghcr.io/abnerdaniel/controle-cliente-frontend:latest
    build:
      context: ./controle-cliente-frontend
      dockerfile: Dockerfile
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.controle-app.rule=Host(`food.meajudaaqui.com.br`)"
        - "traefik.http.routers.controle-app.entrypoints=websecure"
        - "traefik.http.routers.controle-app.tls.certresolver=le"
        - "traefik.http.services.controle-app.loadbalancer.server.port=80"
      restart_policy:
        condition: on-failure
    networks:
      - traefik_public

  # === OBSERVABILIDADE — MÉTRICAS ===

  otel-collector:
    image: otel/opentelemetry-collector:0.119.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observabilidade/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - backend-network
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./observabilidade/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - backend-network
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure

  # === OBSERVABILIDADE — LOGS ===

  loki:
    image: grafana/loki:3.4.1
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observabilidade/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - backend-network
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure

  promtail:
    image: grafana/promtail:3.4.1
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./observabilidade/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - backend-network
    deploy:
      mode: global
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: on-failure

  # === OBSERVABILIDADE — DASHBOARD ===

  grafana:
    image: grafana/grafana:11.5.2
    secrets:
      - grafana_admin_password
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://grafana.food.meajudaaqui.com.br
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - traefik_public
      - backend-network
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.grafana.rule=Host(`grafana.food.meajudaaqui.com.br`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls.certresolver=le"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure

networks:
  traefik_public:
    external: true
  backend-network:
    driver: overlay
    internal: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

secrets:
  grafana_admin_password:
    external: true
